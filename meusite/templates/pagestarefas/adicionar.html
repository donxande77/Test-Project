<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Assunto</title>

  <style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    padding:40px;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1497366811353-6870744d04b2?q=80&w=1600&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* Título */

h1{
    text-align:center;
    color:white;
    font-size:42px;
    margin-bottom:30px;
    text-shadow:2px 2px 10px black;
}

/* Menu */

ul{
    display:flex;
    justify-content:center;
    gap:20px;
    list-style:none;
    margin-bottom:40px;
    flex-wrap:wrap;
}

ul li a{
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#0d6efd,#0056d2);
    padding:14px 28px;
    border-radius:10px;
    font-weight:bold;
    transition:.35s;
    box-shadow:0 6px 15px rgba(13,110,253,.4);
}

ul li a:hover{
    background:linear-gradient(135deg,#198754,#146c43);
    transform:translateY(-5px);
    box-shadow:0 12px 25px rgba(0,0,0,.4);
}

/* Card */

.container{
    max-width:750px;
    margin:auto;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(12px);
    box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#0d6efd;
}

/* Campos */

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    transition:.3s;
    background:#fafafa;
}

textarea{
    resize:none;
    min-height:130px;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 15px rgba(13,110,253,.3);
    background:white;
}

/* Botões */

.botoes{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:35px;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 35px;
    font-size:16px;
    font-weight:bold;
    border-radius:10px;
    transition:.3s;
}

.salvar{
    background:linear-gradient(135deg,#198754,#0f8a4c);
    color:white;
}

.cancelar{
    background:linear-gradient(135deg,#dc3545,#b02a37);
    color:white;
}

button:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

button:active{
    transform:scale(.95);
}

/* Responsivo */

@media(max-width:700px){

    body{
        padding:20px;
    }

    h1{
        font-size:32px;
    }

    ul{
        flex-direction:column;
        align-items:center;
    }

    ul li{
        width:100%;
        max-width:300px;
    }

    ul li a{
        display:block;
        text-align:center;
    }

    .botoes{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
  </style>
</head>
<body>

    <h1>Adicionar Tarefa</h1>

    <ul>
    <li><a href="{% url 'tarefas:home' %}">🏠 Home</a></li>
    <li><a href="{% url 'tarefas:adicionar' %}">➕ Adicionar</a></li>
    <li><a href="{% url 'tarefas:editar' %}">✏️ Editar</a></li>
    <li><a href="{% url 'tarefas:excluir' %}">🗑️ Excluir</a></li>
  </ul>

  <div class="container">
    <h2>Adicionar Assunto</h2>

    <form action="#" method="post">

      <div class="form-group">
        <label for="assunto">Assunto</label>
        <input
          type="text"
          id="assunto"
          name="assunto"
          placeholder="Digite o assunto"
          required>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea
          id="descricao"
          name="descricao"
          placeholder="Digite a descrição"
          required></textarea>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status" required>
          <option value="">Selecione</option>
          <option value="Aberto">Aberto</option>
          <option value="Em andamento">Em andamento</option>
          <option value="Concluído">Concluído</option>
        </select>
      </div>

      <div class="form-group">
        <label for="data">Data</label>
        <input
          type="date"
          id="data"
          name="data"
          required>
      </div>

      <div class="botoes">
        <button type="submit" class="salvar">Salvar</button>
        <button type="reset" class="cancelar">Cancelar</button>
      </div>

    </form>
  </div>

</body>
</html>
